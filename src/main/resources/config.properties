# ============================================================
# WorldOffice Printer - Configuracion
# ============================================================

# Base de datos PostgreSQL
db.url=jdbc:postgresql://localhost:5432/bodega_nuevo
db.user=postgres
db.password=monkey

# Carpeta a vigilar (donde WorldOffice exporta los Excel)
watch.folder=C:\\ImpresionesWorldOffice

# Carpeta donde se mueven los archivos procesados
watch.folder.procesados=C:\\ImpresionesWorldOffice\\procesados
watch.folder.errores=C:\\ImpresionesWorldOffice\\errores

# Delay en milisegundos antes de leer un archivo nuevo
# (esperar a que WorldOffice termine de escribirlo)
watch.delay.ms=2000

# Ancho de impresion en caracteres (48 para 80mm, 32 para 58mm)
printer.char.width=48

# Timeout de conexion a impresora en milisegundos
printer.timeout.ms=5000
